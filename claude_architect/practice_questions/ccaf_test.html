<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>CCAF Practice Exam</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1d24;
    --border: #2c303a;
    --text: #e6e8eb;
    --muted: #9aa1ad;
    --accent: #5b8cff;
    --good: #3ddc84;
    --bad: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .app {
    width: 100%;
    max-width: 760px;
  }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  .toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .toolbar select, .toolbar button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .toolbar button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .progress {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 10px;
  }
  .bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s ease;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }
  .qtext {
    font-size: 1.05rem;
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    background: #15171d;
    transition: border-color 0.15s, background 0.15s;
  }
  .option:hover { border-color: var(--accent); }
  .option.selected { border-color: var(--accent); background: #16203a; }
  .option.correct { border-color: var(--good); background: #103420; }
  .option.incorrect { border-color: var(--bad); background: #3a1414; }
  .option .letter {
    font-weight: 700;
    color: var(--muted);
    min-width: 18px;
    flex-shrink: 0;
  }
  .option > span:last-child {
    flex: 1;
    min-width: 0;
    overflow-wrap: anywhere;
  }
  .option.correct .letter { color: var(--good); }
  .option.incorrect .letter { color: var(--bad); }
  .feedback {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 0.9rem;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.right { background: #103420; color: var(--good); }
  .feedback.wrong { background: #3a1414; color: var(--bad); }
  .nav {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
  }
  .nav button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .nav button:disabled { opacity: 0.4; cursor: not-allowed; }
  .nav button.next {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .summary {
    text-align: center;
    padding: 40px 20px;
  }
  .summary .score {
    font-size: 2.4rem;
    font-weight: 700;
    margin: 10px 0;
  }
  .summary .score.pass { color: var(--good); }
  .summary .score.fail { color: var(--bad); }
  .review-item {
    text-align: left;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-top: 12px;
  }
  .review-item .tag {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .review-item .tag.right { color: var(--good); }
  .review-item .tag.wrong { color: var(--bad); }
  .hidden { display: none; }
  .badge {
    display: inline-block;
    background: var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.75rem;
    margin-left: 8px;
  }

  .option, .toolbar button, .nav button {
    -webkit-tap-highlight-color: transparent;
  }

  @media (max-width: 600px) {
    body { padding: 16px 10px; }
    h1 { font-size: 1.2rem; }
    .subtitle { font-size: 0.8rem; margin-bottom: 16px; }
    .toolbar { flex-direction: column; }
    .toolbar select, .toolbar button {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
    }
    .card { padding: 16px; border-radius: 12px; }
    .qtext { font-size: 1rem; }
    .option {
      padding: 14px;
      min-height: 44px;
      font-size: 0.95rem;
      word-break: break-word;
    }
    .feedback { font-size: 0.9rem; line-height: 1.5; }
    .nav { gap: 10px; }
    .nav button {
      flex: 1;
      padding: 14px 10px;
      font-size: 1rem;
      min-height: 48px;
    }
    .progress { font-size: 0.75rem; }
    .summary { padding: 24px 12px; }
    .summary .score { font-size: 1.8rem; }
    .review-item { padding: 12px; font-size: 0.9rem; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>Claude Certified Architect &ndash; Foundations</h1>
  <div class="subtitle">Practice question engine &middot; <span id="totalCount">0</span> questions loaded</div>

  <div id="setup" class="toolbar">
    <select id="modeSelect">
      <option value="all">All questions</option>
      <option value="random10">Random 10</option>
      <option value="random25">Random 25</option>
      <option value="random50">Random 50</option>
      <option value="first12">First 12 (PDF sample questions)</option>
      <option value="last80">Last 80 (scenario-focused set)</option>
    </select>
    <button id="startBtn" class="primary">Start</button>
  </div>

  <div id="quizArea" class="hidden">
    <div class="progress">
      <span id="qPosition"></span>
      <span id="liveScore"></span>
    </div>
    <div class="bar"><div id="barFill" class="bar-fill"></div></div>

    <div class="card">
      <div id="qtext" class="qtext"></div>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback"></div>
    </div>

    <div class="nav">
      <button id="restartBtn">Restart</button>
      <button id="nextBtn" class="next" disabled>Next</button>
    </div>
  </div>

  <div id="summary" class="summary hidden"></div>
</div>

<script>
const QUESTIONS = [
{
"q": "Production data shows that in 12% of cases, your agent skips get_customer entirely and calls lookup_order using only the customer's stated name, occasionally leading to misidentified accounts and incorrect refunds. What change would most effectively address this reliability issue?",
"options": [
"Add a programmatic prerequisite that blocks lookup_order and process_refund calls until get_customer has returned a verified customer ID.",
"Enhance the system prompt to state that customer verification via get_customer is mandatory before any order operations.",
"Add few-shot examples showing the agent always calling get_customer first, even when customers volunteer order details.",
"Implement a routing classifier that analyzes each request and enables only the subset of tools appropriate for that request type."
],
"correct": 0,
"explain": "Programmatic prerequisites (gates) give deterministic guarantees that critical ordering rules are followed; prompt wording, few-shot examples, and routing classifiers are all probabilistic and don't eliminate the failure rate when errors have financial consequences."
},
{
"q": "Production logs show the agent frequently calls get_customer when users ask about orders (e.g., \"check my order #12345\"), instead of calling lookup_order. Both tools have minimal descriptions (\"Retrieves customer information\" / \"Retrieves order details\") and accept similar identifier formats. What's the most effective first step to improve tool selection reliability?",
"options": [
"Add few-shot examples to the system prompt demonstrating correct tool selection patterns, with 5-8 examples showing order-related queries routing to lookup_order.",
"Expand each tool's description to include input formats it handles, example queries, edge cases, and boundaries explaining when to use it versus similar tools.",
"Implement a routing layer that parses user input before each turn and pre-selects the appropriate tool based on detected keywords and identifier patterns.",
"Consolidate both tools into a single lookup_entity tool that accepts any identifier and internally determines which backend to query."
],
"correct": 1,
"explain": "Tool descriptions are the primary signal an LLM uses to pick between similar tools. Minimal descriptions force the model to guess; expanding them with input formats, example queries, and boundaries fixes the root cause with the least effort."
},
{
"q": "Your agent achieves 55% first-contact resolution, well below the 80% target. Logs show it escalates straightforward cases (standard damage replacements with photo evidence) while attempting to autonomously handle complex situations requiring policy exceptions. What's the most effective way to improve escalation calibration?",
"options": [
"Add explicit escalation criteria to your system prompt with few-shot examples demonstrating when to escalate versus resolve autonomously.",
"Have the agent self-report a confidence score (1-10) before each response and automatically route requests to humans when confidence falls below a threshold.",
"Deploy a separate classifier model trained on historical tickets to predict which requests need escalation before the main agent begins processing.",
"Implement sentiment analysis to detect customer frustration levels and automatically escalate when negative sentiment exceeds a threshold."
],
"correct": 0,
"explain": "Vague escalation behavior comes from unclear decision boundaries in the prompt, not poor confidence calibration or missing ML infrastructure. Explicit criteria plus few-shot examples directly teaches the distinction between escalate-worthy and resolvable cases."
},
{
"q": "You want to create a custom /review slash command that runs your team's standard code review checklist. This command should be available to every developer when they clone or pull the repository. Where should you create this command file?",
"options": [
"In the .claude/commands/ directory in the project repository",
"In ~/.claude/commands/ in each developer's home directory",
"In the CLAUDE.md file at the project root",
"In a .claude/config.json file with a commands array"
],
"correct": 0,
"explain": "Project-scoped slash commands belong in .claude/commands/ within the repo because that directory is version-controlled and automatically available to every developer who clones or pulls."
},
{
"q": "You've been assigned to restructure the team's monolithic application into microservices. This will involve changes across dozens of files and requires decisions about service boundaries and module dependencies. Which approach should you take?",
"options": [
"Enter plan mode to explore the codebase, understand dependencies, and design an implementation approach before making changes.",
"Start with direct execution and make changes incrementally, letting the implementation reveal the natural service boundaries.",
"Use direct execution with comprehensive upfront instructions detailing exactly how each service should be structured.",
"Begin in direct execution mode and only switch to plan mode if you encounter unexpected complexity during implementation."
],
"correct": 0,
"explain": "Large-scale, multi-file restructuring with multiple valid architectural approaches is exactly what plan mode is for: explore and design before committing to changes, avoiding costly rework from late-discovered dependencies."
},
{
"q": "Your codebase has distinct areas with different coding conventions: React components use functional style with hooks, API handlers use async/await with specific error handling, and database models follow a repository pattern. Test files are spread throughout the codebase alongside the code they test (e.g., Button.test.tsx next to Button.tsx), and you want all tests to follow the same conventions regardless of location. What's the most maintainable way to ensure Claude automatically applies the correct conventions when generating code?",
"options": [
"Create rule files in .claude/rules/ with YAML frontmatter specifying glob patterns to conditionally apply conventions based on file paths.",
"Consolidate all conventions in the root CLAUDE.md file under headers for each area, relying on Claude to infer which section applies.",
"Create skills in .claude/skills/ for each code type that include the relevant conventions in their SKILL.md files.",
"Place a separate CLAUDE.md file in each subdirectory containing that area's specific conventions."
],
"correct": 0,
"explain": "Glob-pattern rule files in .claude/rules/ apply conventions based on file path/type regardless of directory location, which is essential when matching files (like tests) are scattered throughout the codebase rather than confined to one folder."
},
{
"q": "After running the system on the topic \"impact of AI on creative industries,\" you observe that each subagent completes successfully: the web search agent finds relevant articles, the document analysis agent summarizes papers correctly, and the synthesis agent produces coherent output. However, the final reports cover only visual arts, completely missing music, writing, and film production. When you examine the coordinator's logs, you see it decomposed the topic into three subtasks: \"AI in digital art creation,\" \"AI in graphic design,\" and \"AI in photography.\" What is the most likely root cause?",
"options": [
"The synthesis agent lacks instructions for identifying coverage gaps in the findings it receives from other agents.",
"The coordinator agent's task decomposition is too narrow, resulting in subagent assignments that don't cover all relevant domains of the topic.",
"The web search agent's queries are not comprehensive enough and need to be expanded to cover more creative industry sectors.",
"The document analysis agent is filtering out sources related to non-visual creative industries due to overly restrictive relevance criteria."
],
"correct": 1,
"explain": "The coordinator's own task decomposition determined the subagents' scope; each subagent succeeded at the narrow task it was given, so the root cause is upstream in how the coordinator broke down the topic, not in any individual subagent's execution."
},
{
"q": "The web search subagent times out while researching a complex topic. You need to design how this failure information flows back to the coordinator agent. Which error propagation approach best enables intelligent recovery?",
"options": [
"Return structured error context to the coordinator including the failure type, the attempted query, any partial results, and potential alternative approaches.",
"Implement automatic retry logic with exponential backoff within the subagent, returning a generic \"search unavailable\" status only after all retries are exhausted.",
"Catch the timeout within the subagent and return an empty result set marked as successful.",
"Propagate the timeout exception directly to a top-level handler that terminates the entire research workflow."
],
"correct": 0,
"explain": "Structured error context (failure type, attempted query, partial results, alternatives) gives the coordinator the information needed to make an intelligent recovery decision, unlike generic statuses, silent success, or workflow termination, which all destroy that information."
},
{
"q": "During testing, you observe that the synthesis agent frequently needs to verify specific claims while combining findings. Currently, when verification is needed, the synthesis agent returns control to the coordinator, which invokes the web search agent, then re-invokes synthesis with results. This adds 2-3 round trips per task and increases latency by 40%. Your evaluation shows that 85% of these verifications are simple fact-checks (dates, names, statistics) while 15% require deeper investigation. What's the most effective approach to reduce overhead while maintaining system reliability?",
"options": [
"Give the synthesis agent a scoped verify_fact tool for simple lookups, while complex verifications continue delegating to the web search agent through the coordinator.",
"Have the synthesis agent accumulate all verification needs and return them as a batch to the coordinator at the end of its pass, which then sends them all to the web search agent at once.",
"Give the synthesis agent access to all web search tools so it can handle any verification need directly without round-trips through the coordinator.",
"Have the web search agent proactively cache extra context around each source during initial research, anticipating what the synthesis agent might need to verify."
],
"correct": 0,
"explain": "Giving the synthesis agent a narrowly scoped verify_fact tool follows least privilege: it solves the common (85%) case without granting broad capabilities outside its specialization, while complex cases still route through the coordinator as before."
},
{
"q": "Your pipeline script runs claude \"Analyze this pull request for security issues\" but the job hangs indefinitely. Logs indicate Claude Code is waiting for interactive input. What's the correct approach to run Claude Code in an automated pipeline?",
"options": [
"Add the -p flag: claude -p \"Analyze this pull request for security issues\"",
"Set the environment variable CLAUDE_HEADLESS=true before running the command",
"Redirect stdin from /dev/null: claude \"Analyze this pull request for security issues\" < /dev/null",
"Add the --batch flag: claude --batch \"Analyze this pull request for security issues\""
],
"correct": 0,
"explain": "The -p (--print) flag puts Claude Code into non-interactive mode so it processes the prompt, writes output, and exits without waiting on stdin -- exactly what's required in an automated CI/CD job."
},
{
"q": "Your team wants to reduce API costs for automated analysis. Currently, real-time Claude calls power two workflows: (1) a blocking pre-merge check that must complete before developers can merge, and (2) a technical debt report generated overnight for review the next morning. Your manager proposes switching both to the Message Batches API for its 50% cost savings. How should you evaluate this proposal?",
"options": [
"Use batch processing for the technical debt reports only; keep real-time calls for pre-merge checks.",
"Switch both workflows to batch processing with status polling to check for completion.",
"Keep real-time calls for both workflows to avoid batch result ordering issues.",
"Switch both to batch processing with a timeout fallback to real-time if batches take too long."
],
"correct": 0,
"explain": "The Message Batches API has no guaranteed latency SLA (up to 24 hours), making it unsuitable for a blocking pre-merge check but a good fit for a latency-tolerant overnight report."
},
{
"q": "A pull request modifies 14 files across the stock tracking module. Your single-pass review analyzing all files together produces inconsistent results: detailed feedback for some files but superficial comments for others, obvious bugs missed, and contradictory feedback — flagging a pattern as problematic in one file while approving identical code elsewhere in the same PR. How should you restructure the review?",
"options": [
"Split into focused passes: analyze each file individually for local issues, then run a separate integration-focused pass examining cross-file data flow.",
"Require developers to split large PRs into smaller submissions of 3-4 files before the automated review runs.",
"Switch to a higher-tier model with a larger context window to give all 14 files adequate attention in one pass.",
"Run three independent review passes on the full PR and only flag issues that appear in at least two of the three runs."
],
"correct": 0,
"explain": "Analyzing 14 files together causes attention dilution -- inconsistent depth and contradictory findings across files. Splitting into per-file local passes plus a separate cross-file integration pass restores consistent depth and still catches cross-file issues."
},
{
"q": "You are building a customer support agent using the Claude Agent SDK. The agent processes billing disputes by calling tools like lookup_order, get_invoice, and process_refund. A code review notes that after each tool call, your loop checks whether Claude's response text contains the phrase \"I have completed\" to decide whether to stop. What is the primary problem with this loop termination approach?",
"options": [
"The agent will never terminate because process_refund always returns a success message that prevents \"I have completed\" from appearing.",
"Relying on natural language signals in the assistant's text is unreliable; the correct approach is to inspect stop_reason and only terminate when it equals \"end_turn\".",
"The loop should terminate as soon as any tool call fails, since continuing after a failure will corrupt the conversation history.",
"Checking response text is only valid in synchronous mode; you must use a callback handler for proper loop control in async contexts."
],
"correct": 1,
"explain": "Free-text phrases like 'I have completed' are an unreliable signal for loop termination. The API's stop_reason field is the authoritative signal: continue on 'tool_use', stop on 'end_turn'."
},
{
"q": "You are building a coordinator that delegates research tasks to subagents using the Task tool. When you test the system, the coordinator cannot invoke any subagents. Reviewing the coordinator's AgentDefinition, you notice the allowedTools field is set to [\"web_search\", \"read_document\"]. What is the most likely cause of the failure?",
"options": [
"The Task tool requires an explicit subagent_endpoint configuration before it can be invoked.",
"\"Task\" is not included in the coordinator's allowedTools, so it cannot spawn subagents.",
"The coordinator's system prompt does not include instructions to use the Task tool, so the model never attempts to call it.",
"Subagent invocation requires the coordinator to be running in plan mode rather than direct execution mode."
],
"correct": 1,
"explain": "The Task tool is the mechanism that spawns subagents. If 'Task' isn't included in allowedTools, the coordinator has no way to invoke subagents no matter what the system prompt says."
},
{
"q": "A coordinator needs to research three independent subtopics in parallel: market trends, competitor analysis, and regulatory environment. Each requires a separate web search subagent. How should the coordinator spawn these subagents to maximize throughput?",
"options": [
"Spawn the subtopics sequentially: start the first subagent, wait for its result, then start the second, and so on, to avoid context conflicts.",
"Emit all three Task tool calls in a single coordinator response, which allows the subagents to run in parallel.",
"Route all three subtopics through a single subagent sequentially, sharing context between them to reduce total memory usage.",
"Use a single subagent with three separate prompts in sequence, passing prior results as context for each subsequent prompt."
],
"correct": 1,
"explain": "Emitting all three Task tool calls within a single coordinator response lets the subagents execute in parallel, which maximizes throughput versus any sequential or single-subagent approach."
},
{
"q": "Your customer support agent has a policy: refunds above $500 require manager approval and must not be processed autonomously. Your system prompt states \"Do not process refunds above $500 without manager approval.\" Production logs show this rule is violated in approximately 3% of cases. What is the most effective way to guarantee compliance?",
"options": [
"Strengthen the system prompt language: \"You are strictly forbidden from processing refunds above $500 without explicit manager approval under any circumstances.\"",
"Add 10 few-shot examples in the system prompt, all demonstrating the agent requesting manager approval for high-value refunds.",
"Implement a hook that intercepts outgoing process_refund tool calls, checks the refund amount, and blocks execution or redirects to the manager approval workflow when the amount exceeds $500.",
"Implement a validation step that runs after process_refund completes and reverses any refunds that exceeded the threshold."
],
"correct": 2,
"explain": "A PreToolUse-style hook that intercepts the outgoing process_refund call and blocks or redirects amounts above $500 provides a deterministic guarantee; strengthening prompt language or adding few-shot examples only improves probabilistic compliance, which still has a non-zero failure rate."
},
{
"q": "You are leading a research investigation using Claude Code. You have completed an initial analysis of a competitor's public API documentation and want to explore two divergent architectural approaches for your response strategy: one focused on feature parity, one focused on differentiation. You want both explorations to start from the same analysis baseline. Which session management approach best fits this scenario?",
"options": [
"Run two separate new sessions, each with a copy of the analysis findings injected as context in the initial prompt.",
"Use --resume to resume the current session twice in parallel, once for each exploration direction.",
"Use fork_session to create two independent branches from the current session, then explore each approach in its respective branch.",
"Continue in the same session, exploring one approach, then using /compact to clear context before exploring the second approach."
],
"correct": 2,
"explain": "fork_session creates independent branches from a shared analysis baseline, letting you explore two divergent strategies (feature parity vs. differentiation) without re-deriving the initial competitor analysis in each one."
},
{
"q": "A web search subagent in your research system calls search_web and receives the following response: {\"results\": [], \"status\": \"success\"}. The subagent reports to the coordinator: \"Web search was successful but no relevant results were found.\" Later you discover the search API was actually down and returning empty results for all queries. What change to the MCP tool's error handling would prevent this confusion?",
"options": [
"Always return a non-empty results array by including fallback content when the actual search returns nothing.",
"Distinguish between access failures (where the backend could not be reached or returned an error) and valid empty results (where the search succeeded but found no matches), using the isError flag for the former.",
"Add a confidence field to the response so the agent can infer whether the empty result is a real outcome or a failure.",
"Implement automatic retry in the MCP tool itself, so the agent never sees an empty result unless all retries were exhausted."
],
"correct": 1,
"explain": "The isError flag distinguishes a genuine access failure (backend down) from a valid empty result (search succeeded, found nothing) -- without that distinction, '{results: [], status: success}' looks identical to a real outage."
},
{
"q": "Your customer support system requires that every response from the draft_response agent includes a structured JSON summary before the agent returns its output. You want to guarantee the agent calls the generate_summary tool on every invocation, not optionally. Which tool_choice configuration achieves this?",
"options": [
"Set tool_choice: \"auto\" so the model decides when the summary tool is needed.",
"Set tool_choice: \"any\" so the model must call at least one tool, though it may choose a different tool instead.",
"Set tool_choice: {\"type\": \"tool\", \"name\": \"generate_summary\"} to force the model to call generate_summary specifically.",
"Remove all other tools from the agent's tool list so generate_summary is the only option available."
],
"correct": 2,
"explain": "Forcing a specific named tool via tool_choice: {type: tool, name: ...} is the only setting that guarantees that exact tool is called every time; 'auto' and 'any' both leave room for the model to skip it or pick something else."
},
{
"q": "Your team is setting up a shared GitHub MCP server for all engineers on a project. The server requires a GitHub API token for authentication. You want every engineer who clones the repository to have the MCP server available without each person having to manually configure it, and you want to avoid committing the actual token to version control. What is the correct configuration approach?",
"options": [
"Add the MCP server to ~/.claude.json on each developer's machine with their personal token hardcoded.",
"Add the MCP server to the project-scoped .mcp.json file with the token specified using environment variable expansion (e.g., ${GITHUB_TOKEN}), and commit .mcp.json to the repository.",
"Add the MCP server configuration to the root CLAUDE.md file under a [mcp_servers] section.",
"Create a setup script that each developer runs once to add the MCP server to their personal ~/.claude.json with their token."
],
"correct": 1,
"explain": "Project-scoped .mcp.json with environment-variable expansion (${GITHUB_TOKEN}) lets every developer get the server automatically on clone/pull while each person's actual token stays out of version control, since it's resolved from their local environment."
},
{
"q": "A senior engineer adds detailed coding standards and security guidelines to their ~/.claude/CLAUDE.md file. When a new team member joins and clones the repository, they report that Claude Code behaves differently and does not appear to follow the team's documented standards. What is the most likely cause?",
"options": [
"The new team member's Claude Code version is outdated and does not support shared configuration files.",
"The ~/.claude/CLAUDE.md file is user-scoped and not version-controlled, so teammates do not receive it when they clone the repository.",
"CLAUDE.md files must be placed in the .claude/ subdirectory to be recognized; a root-level CLAUDE.md is ignored.",
"The configuration hierarchy requires the project-level file to explicitly import from user-level files using @import."
],
"correct": 1,
"explain": "~/.claude/CLAUDE.md is user-scoped and never committed to version control, so a teammate who clones the repo simply never receives those instructions -- the fix is moving them to a project-level file."

document.getElementById('totalCount').textContent = QUESTIONS.length;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

document.getElementById('startBtn').addEventListener('click', () => {
  const mode = document.getElementById('modeSelect').value;
  let indices = QUESTIONS.map((_, i) => i);

  if (mode === 'first12') {
    indices = indices.slice(0, 12);
  } else if (mode === 'last80') {
    indices = indices.slice(Math.max(0, indices.length - 80));
  } else if (mode === 'random10') {
    indices = shuffle(indices).slice(0, 10);
  } else if (mode === 'random25') {
    indices = shuffle(indices).slice(0, 25);
  } else if (mode === 'random50') {
    indices = shuffle(indices).slice(0, 50);
  } else {
    indices = shuffle(indices);
  }

  order = indices;
  idx = 0;
  answers = [];

  document.getElementById('setup').classList.add('hidden');
  document.getElementById('summary').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  renderQuestion();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('quizArea').classList.add('hidden');
  document.getElementById('summary').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
});

document.getElementById('nextBtn').addEventListener('click', () => {
  idx++;
  if (idx >= order.length) {
    renderSummary();
  } else {
    renderQuestion();
  }
});

function renderQuestion() {
  const qIndex = order[idx];
  const q = QUESTIONS[qIndex];

  document.getElementById('qPosition').textContent = `Question ${idx + 1} of ${order.length}`;
  const correctSoFar = answers.filter(a => a.correct).length;
  document.getElementById('liveScore').textContent = `Score: ${correctSoFar}/${answers.length}`;
  document.getElementById('barFill').style.width = `${(idx / order.length) * 100}%`;

  document.getElementById('qtext').textContent = q.q;

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D', 'E', 'F'];

  currentOptionOrder = shuffle(q.options.map((_, i) => i));

  currentOptionOrder.forEach((originalIndex, displayPos) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="letter">${letters[displayPos]}</span><span>${q.options[originalIndex]}</span>`;
    div.addEventListener('click', () => selectAnswer(qIndex, originalIndex));
    optionsEl.appendChild(div);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').disabled = true;
}

function selectAnswer(qIndex, chosenIndex) {
  // prevent double-answering
  if (document.getElementById('nextBtn').disabled === false) return;

  const q = QUESTIONS[qIndex];
  const isCorrect = chosenIndex === q.correct;
  answers.push({ qIndex, chosen: chosenIndex, correct: isCorrect });

  const optionEls = document.querySelectorAll('#options .option');
  optionEls.forEach((el, displayPos) => {
    const originalIndex = currentOptionOrder[displayPos];
    if (originalIndex === q.correct) el.classList.add('correct');
    if (originalIndex === chosenIndex && originalIndex !== q.correct) el.classList.add('incorrect');
    if (originalIndex === chosenIndex) el.classList.add('selected');
  });

  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  fb.innerHTML = '';

  const verdict = document.createElement('div');
  verdict.style.fontWeight = '700';
  verdict.style.marginBottom = q.explain ? '8px' : '0';

  if (isCorrect) {
    fb.classList.add('right');
    verdict.textContent = 'Correct.';
  } else {
    fb.classList.add('wrong');
    verdict.textContent = `Incorrect. Correct answer: ${q.options[q.correct]}`;
  }
  fb.appendChild(verdict);

  if (q.explain) {
    const explainEl = document.createElement('div');
    explainEl.style.color = 'var(--text)';
    explainEl.style.fontWeight = '400';
    explainEl.style.lineHeight = '1.5';
    explainEl.textContent = q.explain;
    fb.appendChild(explainEl);
  }

  document.getElementById('liveScore').textContent =
    `Score: ${answers.filter(a => a.correct).length}/${answers.length}`;
  document.getElementById('nextBtn').disabled = false;
}

function renderSummary() {
  document.getElementById('quizArea').classList.add('hidden');
  const summaryEl = document.getElementById('summary');
  summaryEl.classList.remove('hidden');

  const total = answers.length;
  const correct = answers.filter(a => a.correct).length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  const passed = pct >= 72; // approximates the 720/1000 scaled passing threshold

  let html = `
    <h2>Results</h2>
    <div class="score ${passed ? 'pass' : 'fail'}">${correct} / ${total} (${pct}%)</div>
    <div>${passed ? 'Passing range' : 'Below typical passing threshold (~72%)'}</div>
  `;

  const wrong = answers.filter(a => !a.correct);
  if (wrong.length > 0) {
    html += `<h3 style="margin-top:30px;">Review missed questions (${wrong.length})</h3>`;
    wrong.forEach(a => {
      const q = QUESTIONS[a.qIndex];
      html += `
        <div class="review-item">
          <div class="tag wrong">Missed</div>
          <div>${q.q}</div>
          <div style="margin-top:8px; color: var(--bad);">Your answer: ${q.options[a.chosen]}</div>
          <div style="margin-top:4px; color: var(--good);">Correct answer: ${q.options[q.correct]}</div>
          ${q.explain ? `<div style="margin-top:8px; color: var(--text); line-height:1.5;">${q.explain}</div>` : ''}
        </div>
      `;
    });
  } else if (total > 0) {
    html += `<div style="margin-top:20px;">Perfect run &mdash; no missed questions.</div>`;
  }

  html += `<div style="margin-top:30px;"><button id="restartBtn2">Try again</button></div>`;
  summaryEl.innerHTML = html;
  document.getElementById('restartBtn2').addEventListener('click', () => {
    summaryEl.classList.add('hidden');
    document.getElementById('setup').classList.remove('hidden');
  });
}
</script>
</body>
</html>
